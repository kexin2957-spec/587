services:
  - type: web
    name: ai-agent-marketplace
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_SITE_URL
        value: https://ai-agent-marketplace-tg4f.onrender.com
      - key: NEXT_PUBLIC_REPORT_API_BASE_URL
        value: https://media-account-diagnosis-api.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REPORT_API_ALLOWED_ORIGINS
        value: https://ai-agent-marketplace-tg4f.onrender.com

  - type: web
    name: media-account-diagnosis-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:api
    autoDeploy: true
    envVars:
      - key: AI_PROVIDER
        value: moonshot
      - key: MOONSHOT_API_KEY
        sync: false
      - key: MOONSHOT_BASE_URL
        value: https://api.moonshot.cn/v1
      - key: AI_MODEL
        value: moonshot-v1-8k
      - key: REPORT_API_ALLOWED_ORIGINS
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
